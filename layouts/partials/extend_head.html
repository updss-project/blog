<!-- Mermaid diagram support -->
{{ if .Params.mermaid }}
<style>
  /* Force bright visible arrows and edges in Mermaid diagrams */
  .mermaid .edgePath .path {
    stroke: #0ea5e9 !important;
    stroke-width: 2px !important;
    stroke-dasharray: none !important;
  }
  .mermaid .edgePath marker path {
    fill: #0ea5e9 !important;
  }
  .mermaid marker path {
    fill: #0ea5e9 !important;
  }
  .mermaid .edgeLabel {
    background-color: #1e293b !important;
    color: #e2e8f0 !important;
    padding: 2px 6px !important;
    border-radius: 3px !important;
  }
  .mermaid .cluster rect {
    stroke: #0ea5e9 !important;
    stroke-width: 1.5px !important;
  }
  .mermaid .flowchart-link {
    stroke: #0ea5e9 !important;
    stroke-width: 2px !important;
  }
  /* Arrowheads */
  .mermaid #arrowhead path,
  .mermaid [id*="arrowhead"] path,
  .mermaid marker[id*="arrow"] path {
    fill: #0ea5e9 !important;
    stroke: #0ea5e9 !important;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var isDark = document.querySelector('html').dataset.theme === 'dark' ||
      (document.querySelector('html').dataset.theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);

    mermaid.initialize({
      startOnLoad: true,
      theme: isDark ? 'dark' : 'default',
      securityLevel: 'loose',
      themeVariables: isDark ? {
        lineColor: '#0ea5e9',
        primaryColor: '#1e3a5f',
        primaryTextColor: '#e2e8f0',
        primaryBorderColor: '#0ea5e9',
        secondaryColor: '#1e293b',
        tertiaryColor: '#0f172a',
        edgeLabelBackground: '#1e293b',
        clusterBkg: '#0f172a',
        clusterBorder: '#0ea5e9',
        titleColor: '#e2e8f0',
        nodeTextColor: '#e2e8f0'
      } : {}
    });
    // Convert ```mermaid code blocks to mermaid-rendered divs
    document.querySelectorAll('pre > code.language-mermaid').forEach(function(el) {
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = el.textContent;
      el.parentElement.replaceWith(div);
    });
  });
</script>
{{ end }}
